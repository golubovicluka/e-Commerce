<app-breadcrumb [home]="home" [items]="items"></app-breadcrumb>

<div class="section-head">
  <div>
    <span class="eyebrow">Browse</span>
    <h1 class="page-title">Shop by category</h1>
    <p class="section-sub">Find your way to the right gear faster.</p>
  </div>
</div>

@if (categories) {
  <div class="categories-grid stagger">
    @for (category of categories; track category) {
      <app-category (applyCategoryFilter)="openProductsPage($event)"
      [name]="category.name" [id]="category.id"></app-category>
    }
  </div>
} @else {
  <div class="categories-grid">
    @for (s of [1, 2, 3, 4, 5, 6]; track s) {
      <div class="skeleton category-skeleton"></div>
    }
  </div>
}
