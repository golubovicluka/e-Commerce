<p-toast position="bottom-left"></p-toast>
<p-breadcrumb [home]="home" [model]="items"></p-breadcrumb>

<div class="section-head" *ngIf="wishlistItems.length > 0">
  <div>
    <span class="eyebrow">Saved for later</span>
    <h1 class="page-title">Your wishlist</h1>
  </div>
  <span class="results-count font-mono">{{ wishlistItems.length }}
    {{ wishlistItems.length === 1 ? 'item' : 'items' }}</span>
</div>

<ng-container *ngIf="wishlistItems; else loading">
  <div class="wishlist-items stagger">
    <div class="wishlist-row" *ngFor="let product of wishlistItems; trackBy: trackByProductId" auto-animate>
      <button class="remove-btn" type="button" (click)="removeFromWishlist(product)"
        [attr.aria-label]="'Remove ' + product.name + ' from wishlist'">
        <i class="pi pi-times"></i>
      </button>
      <app-product (addedToCart)="addToCart($event)" (removedFromCart)="removeFromCart($event)"
        [isListView]="true" [categoryId]="product.categoryId" [subcategoryId]="product.subcategoryId"
        [wishlistView]="true" [name]="product.name"
        [category]="product.category" [subcategory]="product.subcategory" [id]="product.id" [images]="product.images"
        [inStock]="product.inStock" [price]="product.price" [description]="product.description"
        [EAN]="product.EAN"></app-product>
    </div>
  </div>
  <div class="empty-state component-enter" *ngIf="wishlistItems.length === 0">
    <i class="pi pi-heart"></i>
    <h3>Your wishlist is empty</h3>
    <p>Save products you love and find them here later.</p>
    <button class="p-button-outlined" type="button" pButton pRipple [routerLink]="['/products/search']"
      label="Find a product"></button>
  </div>
</ng-container>

<ng-template #loading>
  <div class="wishlist-items">
    <div class="skeleton wishlist-skeleton" *ngFor="let s of [1, 2]"></div>
  </div>
</ng-template>
