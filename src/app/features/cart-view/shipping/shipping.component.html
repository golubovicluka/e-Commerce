<div class="checkout-panel component-enter">
  <div class="panel-head">
    <span class="eyebrow">Step 1 of 3</span>
    <h3 class="panel-title">Where should we deliver?</h3>
  </div>

  <div class="formgrid grid">
    <div class="field col-12 md:col-6">
      <label for="ship-name">First name</label>
      <input id="ship-name" class="p-inputtext w-full" type="text" autocomplete="given-name" [(ngModel)]="name" />
    </div>
    <div class="field col-12 md:col-6">
      <label for="ship-lastname">Last name</label>
      <input id="ship-lastname" class="p-inputtext w-full" type="text" autocomplete="family-name"
        [(ngModel)]="lastName" />
    </div>
    <div class="field col-12 md:col-8">
      <label for="ship-address">Street address</label>
      <input id="ship-address" class="p-inputtext w-full" type="text" autocomplete="street-address"
        [(ngModel)]="address" />
    </div>
    <div class="field col-12 md:col-4">
      <label for="ship-apartment">Apartment <span class="optional">(optional)</span></label>
      <input id="ship-apartment" class="p-inputtext w-full" type="text" [(ngModel)]="apartmentNumber" />
    </div>
    <div class="field col-12 md:col-4">
      <label for="ship-postal">Postal code</label>
      <input id="ship-postal" class="p-inputtext w-full" type="text" autocomplete="postal-code" inputmode="numeric"
        [(ngModel)]="postalCode" />
    </div>
    <div class="field col-12 md:col-8">
      <label for="ship-city">City</label>
      <input id="ship-city" class="p-inputtext w-full" type="text" autocomplete="address-level2" [(ngModel)]="city" />
    </div>
    <div class="field col-12 md:col-6">
      <label for="ship-phone">Phone number</label>
      <input id="ship-phone" class="p-inputtext w-full" type="tel" autocomplete="tel" [(ngModel)]="phoneNumber" />
    </div>
    <div class="field col-12">
      <label for="ship-notes">Delivery notes <span class="optional">(optional)</span></label>
      <textarea id="ship-notes" class="p-inputtext w-full" placeholder="Door code, floor, preferred time window…"
        rows="4" [(ngModel)]="additionalInformation"></textarea>
    </div>
  </div>

  <label class="save-details" for="saveDetails">
    <input name="saveDetails" type="checkbox" [id]="saveFormDetails" [(ngModel)]="saveDetails">
    <span>Save these details for faster checkout next time</span>
  </label>

  <div class="panel-actions">
    <a class="p-button" [routerLink]="['/cart/overview']">
      Continue to overview <i class="pi pi-arrow-right" aria-hidden="true"></i>
    </a>
  </div>
</div>
