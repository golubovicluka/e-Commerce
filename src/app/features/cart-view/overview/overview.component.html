<div class="checkout-panel component-enter">
  <div class="panel-head">
    <span class="eyebrow">Step 2 of 3</span>
    <h3 class="panel-title">Review your order</h3>
  </div>

  <div class="overview-list">
    @for (line of cartLines(); track line.product.id) {
      <div class="overview-row">
        <span class="row-name">
          {{ line.product.name }}
          @if (line.quantity > 1) {
            <span class="row-qty">&times; {{ line.quantity }}</span>
          }
        </span>
        <span class="row-price font-mono">{{ line.lineTotal | number }} RSD</span>
      </div>
    }
    <div class="overview-row overview-row--shipping">
      <span class="row-name">Shipping</span>
      <span class="row-free">Free</span>
    </div>
    <div class="overview-total">
      <span>Total</span>
      <span class="font-mono">{{ total() | number }} RSD</span>
    </div>
  </div>

  <div class="panel-actions">
    <a class="p-button p-button-outlined" [routerLink]="['/cart/shipping']">
      <i class="pi pi-arrow-left" aria-hidden="true"></i> Back
    </a>
    <a class="p-button" [routerLink]="['/cart/payment']">
      Continue to payment <i class="pi pi-arrow-right" aria-hidden="true"></i>
    </a>
  </div>
</div>
