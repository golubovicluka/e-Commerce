<div class="checkout-panel component-enter">
  <div class="panel-head">
    <span class="eyebrow">Step 2 of 3</span>
    <h3 class="panel-title">Review your order</h3>
  </div>

  <div class="overview-list">
    <div class="overview-row" *ngFor="let line of cartLines$ | async">
      <span class="row-name">
        {{ line.product.name }}
        <span class="row-qty" *ngIf="line.quantity > 1">&times; {{ line.quantity }}</span>
      </span>
      <span class="row-price font-mono">{{ line.lineTotal | number }} RSD</span>
    </div>
    <div class="overview-row overview-row--shipping">
      <span class="row-name">Shipping</span>
      <span class="row-free">Free</span>
    </div>
    <div class="overview-total">
      <span>Total</span>
      <span class="font-mono">{{ total$ | async | number }} RSD</span>
    </div>
  </div>

  <div class="panel-actions">
    <p-button [routerLink]="['/cart/shipping']" label="Back" icon="pi pi-arrow-left"
      styleClass="p-button-outlined"></p-button>
    <p-button [routerLink]="['/cart/payment']" label="Continue to payment" icon="pi pi-arrow-right"
      iconPos="right"></p-button>
  </div>
</div>
